<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Thank You — Kibo Coffee</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&family=Playfair+Display:ital,wght@0,700;0,800;1,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="shared.css">
<style>
body{background:var(--espresso);color:var(--silk);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:3rem 2rem;cursor:auto}
.s-logo{font-family:var(--font-display);font-size:2.2rem;font-weight:800;letter-spacing:.3em;color:var(--gold);margin-bottom:3rem}
.s-icon{font-size:3.5rem;margin-bottom:1.5rem}
.s-title{font-family:var(--font-display);font-size:clamp(2.4rem,6vw,5rem);font-weight:800;color:var(--silk);line-height:1.05;margin-bottom:1rem}
.s-title em{font-style:italic;color:var(--gold)}
.s-sub{font-size:15px;color:rgba(242,233,216,.7);margin-bottom:.8rem;max-width:500px;line-height:1.8}
.s-detail{font-size:13px;color:rgba(242,233,216,.45);margin-bottom:3rem}
.divider{width:1px;height:60px;background:linear-gradient(to bottom,var(--gold),transparent);margin:2.5rem auto;opacity:.5}
.s-btns{display:flex;gap:1rem;justify-content:center;flex-wrap:wrap}
.s-btn{font-size:12px;letter-spacing:2.5px;text-transform:uppercase;padding:14px 32px;text-decoration:none;font-weight:700;transition:all .3s}
.s-btn.primary{background:var(--gold);color:var(--espresso)}
.s-btn.primary:hover{background:var(--gold-dark);color:var(--silk)}
.s-btn.outline{border:2px solid rgba(197,168,128,.4);color:var(--silk)}
.s-btn.outline:hover{border-color:var(--gold);color:var(--gold)}
</style>
<script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
</head>
<body>
<div class="s-logo">KIBO</div>
<div class="s-icon">☕</div>
<h1 class="s-title">Thank You.<br><em>We'll Be in Touch.</em></h1>
<p class="s-sub">Your enquiry has been received by the Kibo Coffee team. We respond to all export and wholesale inquiries within 24 hours.</p>
<p class="s-detail">In the meantime, feel free to explore our collection or reach us directly on WhatsApp.</p>
<div class="divider"></div>
<div class="s-btns">
  <a href="index.html" class="s-btn primary">Return to Home</a>
  <a href="catalogue.html" class="s-btn outline">View the Collection</a>
</div>
</body></html>
